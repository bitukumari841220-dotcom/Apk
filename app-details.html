<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Details</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 20px; }
        .back-btn { text-decoration: none; color: #4f46e5; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .card { max-width: 650px; margin: 0 auto; background: white; border-radius: 16px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        .header { display: flex; align-items: center; gap: 20px; }
        .header img { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; }
        .header-info h2 { margin: 0 0 5px 0; color: #1e1e2f; }
        .header-info p { margin: 0; color: #6c757d; font-size: 14px; }
        
        .download-btn { display: block; text-align: center; background: #10b981; color: white; padding: 14px; border-radius: 10px; text-decoration: none; font-size: 18px; font-weight: bold; margin: 25px 0; transition: 0.2s; }
        .download-btn:hover { background: #059669; }
        
        /* Multiple Screenshots Gallery */
        .screenshots-box { margin: 25px 0; }
        .screenshots-box h3 { font-size: 16px; color: #1e1e2f; margin-bottom: 10px; }
        .screenshots-gallery { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: thin; }
        .screenshots-gallery img { height: 220px; border-radius: 10px; object-fit: cover; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .desc-box { background: #f8fafc; padding: 15px; border-radius: 10px; border-left: 4px solid #4f46e5; margin-bottom: 25px; }
        .desc-box h3 { margin-top: 0; font-size: 16px; color: #1e1e2f; }
        .desc-box p { color: #475569; line-height: 1.6; margin: 0; white-space: pre-line; }

        /* Review Styles */
        .review-section { border-top: 2px solid #f1f5f9; padding-top: 20px; }
        .review-form input, .review-form textarea, .review-form select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
        .review-form button { background: #4f46e5; color: white; border: none; padding: 11px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .review-card { background: #f8fafc; padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

    <div class="card">
        <a href="index.html" class="back-btn">← वापस जाएं</a>

        <div id="detailsContainer">
            <p style="text-align: center; color: #666;">विवरण लोड हो रहा है...</p>
        </div>

        <!-- Screenshots Gallery -->
        <div class="screenshots-box" id="screenshotsWrapper" style="display: none;">
            <h3>📷 ऐप स्क्रीनशॉट्स (Screenshots)</h3>
            <div class="screenshots-gallery" id="screenshotsGallery"></div>
        </div>

        <!-- Reviews -->
        <div class="review-section">
            <h3>⭐ रिव्यू और रेटिंग्स (Reviews)</h3>
            <div class="review-form">
                <input type="text" id="revName" placeholder="आपका नाम">
                <select id="revRating">
                    <option value="5">⭐⭐⭐⭐⭐ (5/5)</option>
                    <option value="4">⭐⭐⭐⭐ (4/5)</option>
                    <option value="3">⭐⭐⭐ (3/5)</option>
                    <option value="2">⭐⭐ (2/5)</option>
                    <option value="1">⭐ (1/5)</option>
                </select>
                <textarea id="revComment" rows="2" placeholder="अपनी राय लिखें..."></textarea>
                <button id="submitReviewBtn">रिव्यू पोस्ट करें</button>
            </div>
            <div id="reviewsList" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, getDocs, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0R02aKjwM9LmVtioonueDHHCdKB02bzI",
            authDomain: "apkf-5a08a.firebaseapp.com",
            projectId: "apkf-5a08a",
            storageBucket: "apkf-5a08a.appspot.com",
            messagingSenderId: "937381010908",
            appId: "1:937381010908:web:c89638cc58fea6f2420319"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const appId = urlParams.get('id');

        async function loadAppDetails() {
            const container = document.getElementById('detailsContainer');
            if (!appId) {
                container.innerHTML = "<p>अमान्य ऐप आईडी!</p>";
                return;
            }

            try {
                const docRef = doc(db, "apps", appId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    container.innerHTML = `
                        <div class="header">
                            <img src="${data.iconUrl}" alt="${data.name}" onerror="this.src='https://via.placeholder.com/90'">
                            <div class="header-info">
                                <h2>${data.name}</h2>
                                <p>वर्जन: v${data.version}</p>
                                <p>साइज़: ${data.sizeMB} MB</p>
                            </div>
                        </div>
                        <a href="${data.apkUrl}" class="download-btn" target="_blank">📥 Direct APK Download</a>
                        <div class="desc-box">
                            <h3>ऐप विवरण</h3>
                            <p>${data.description || 'कोई विवरण उपलब्ध नहीं है।'}</p>
                        </div>
                    `;

                    // Multi-Screenshots rendering
                    if (data.screenshots && data.screenshots.length > 0) {
                        const gallery = document.getElementById('screenshotsGallery');
                        gallery.innerHTML = "";
                        data.screenshots.forEach(url => {
                            if(url) gallery.innerHTML += `<img src="${url}" alt="Screenshot">`;
                        });
                        document.getElementById('screenshotsWrapper').style.display = "block";
                    }

                } else {
                    container.innerHTML = "<p>ऐप नहीं मिला!</p>";
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function loadReviews() {
            const list = document.getElementById('reviewsList');
            try {
                const q = query(collection(db, "apps", appId, "reviews"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                list.innerHTML = "";

                if(snap.empty) {
                    list.innerHTML = "<p style='color:#777;'>अभी तक कोई रिव्यू नहीं आया है।</p>";
                    return;
                }

                snap.forEach(d => {
                    const r = d.data();
                    list.innerHTML += `
                        <div class="review-card">
                            <b>${r.name}</b> ${"⭐".repeat(r.rating)}
                            <p style="margin:4px 0 0 0; color:#475569;">${r.comment}</p>
                        </div>
                    `;
                });
            } catch(e) { console.error(e); }
        }

        document.getElementById('submitReviewBtn').addEventListener('click', async () => {
            const name = document.getElementById('revName').value.trim() || "User";
            const rating = parseInt(document.getElementById('revRating').value);
            const comment = document.getElementById('revComment').value.trim();

            if(!comment) { alert("रिव्यू टिप्पणी लिखें!"); return; }

            await addDoc(collection(db, "apps", appId, "reviews"), {
                name, rating, comment, createdAt: serverTimestamp()
            });

            document.getElementById('revComment').value = "";
            loadReviews();
        });

        loadAppDetails();
        loadReviews();
    </script>
</body>
</html>
