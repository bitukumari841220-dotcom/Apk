<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK Store - Home</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background: #f8fafc; 
            margin: 0; 
            padding: 0; 
            color: #0f172a; 
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: #ffffff;
            padding: 16px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #f1f5f9;
        }
        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        .logo {
            font-size: 22px;
            font-weight: 800;
            color: #4f46e5;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Hero / Search Section */
        .hero {
            max-width: 1100px;
            margin: 25px auto 10px;
            padding: 0 16px;
        }
        .search-box {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }
        .search-box input {
            width: 100%;
            padding: 16px 20px 16px 48px;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            font-size: 15px;
            outline: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            transition: all 0.2s ease;
        }
        .search-box input:focus {
            border-color: #6366f1;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.15);
        }
        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #94a3b8;
        }

        /* Main App Grid */
        .container {
            max-width: 1100px;
            margin: 20px auto 40px;
            padding: 0 16px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 16px;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 18px;
        }

        .app-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 18px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.03);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.25s ease;
            position: relative;
        }
        .app-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        .app-header {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .app-icon {
            width: 68px;
            height: 68px;
            border-radius: 18px;
            object-fit: cover;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .app-info { flex: 1; overflow: hidden; }
        .app-name {
            margin: 0 0 4px 0;
            font-size: 16px;
            font-weight: 800;
            color: #0f172a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .developer-name {
            margin: 0;
            font-size: 12px;
            color: #64748b;
            font-weight: 600;
        }
        .app-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
            font-size: 12px;
            color: #64748b;
            font-weight: 600;
        }
        .badge-down {
            background: #e0e7ff;
            color: #4338ca;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 11px;
        }

        .app-footer {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .btn-details {
            flex: 1;
            text-align: center;
            background: #f1f5f9;
            color: #0f172a;
            padding: 10px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            transition: background 0.2s;
        }
        .btn-details:hover { background: #e2e8f0; }
        .btn-dl {
            flex: 1;
            text-align: center;
            background: #10b981;
            color: white;
            padding: 10px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            transition: opacity 0.2s;
        }
        .btn-dl:hover { opacity: 0.9; }

        .loading-text {
            text-align: center;
            color: #64748b;
            grid-column: 1 / -1;
            padding: 40px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🚀 APK Store</a>
        </div>
    </nav>

    <!-- Search Section -->
    <div class="hero">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="ऐप या गेम खोजें (Search Apps)...">
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="section-title">
            <span>🔥 सभी ऐप्स (Latest Apps)</span>
        </div>

        <div class="app-grid" id="appGrid">
            <div class="loading-text">ऐप्स लोड हो रहे हैं...</div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0R02aKjwM9LmVtioonueDHHCdKB02bzI",
            authDomain: "apkf-5a08a.firebaseapp.com",
            projectId: "apkf-5a08a",
            storageBucket: "apkf-5a08a.appspot.com",
            messagingSenderId: "937381010908",
            appId: "1:937381010908:web:c89638cc58fea6f2420319"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allApps = [];

        async function loadApps() {
            const grid = document.getElementById('appGrid');
            try {
                const q = query(collection(db, "apps"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    grid.innerHTML = "<div class='loading-text'>कोई ऐप उपलब्ध नहीं है।</div>";
                    return;
                }

                allApps = [];
                snap.forEach(doc => {
                    allApps.push({ id: doc.id, ...doc.data() });
                });

                renderApps(allApps);
            } catch (e) {
                console.error(e);
                grid.innerHTML = "<div class='loading-text' style='color:red;'>ऐप्स लोड करने में समस्या आई!</div>";
            }
        }

        function renderApps(apps) {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = "";

            if (apps.length === 0) {
                grid.innerHTML = "<div class='loading-text'>कोई ऐप नहीं मिला!</div>";
                return;
            }

            apps.forEach(app => {
                grid.innerHTML += `
                    <div class="app-card">
                        <div class="app-header">
                            <img src="${app.iconUrl}" alt="${app.name}" class="app-icon" onerror="this.src='https://via.placeholder.com/68'">
                            <div class="app-info">
                                <h3 class="app-name">${app.name}</h3>
                                <p class="developer-name">${app.developer || 'Verified Developer'}</p>
                                <div class="app-meta">
                                    <span class="badge-down">📥 ${app.downloads || '1K+'}</span>
                                    <span>v${app.version}</span>
                                    <span>• ${app.sizeMB} MB</span>
                                </div>
                            </div>
                        </div>
                        <div class="app-footer">
                            <a href="app-details.html?id=${app.id}" class="btn-details">विवरण (Details)</a>
                            <a href="${app.apkUrl}" class="btn-dl" target="_blank">डाउनलोड</a>
                        </div>
                    </div>
                `;
            });
        }

        // Live Search Filter
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            const filtered = allApps.filter(a => 
                a.name.toLowerCase().includes(term) || 
                (a.developer && a.developer.toLowerCase().includes(term))
            );
            renderApps(filtered);
        });

        loadApps();
    </script>
</body>
</html>
